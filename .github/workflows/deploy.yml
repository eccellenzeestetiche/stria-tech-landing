name: Deploy to SiteGround

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy via SCP
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SITEGROUND_HOST }}
          username: ${{ secrets.SITEGROUND_USERNAME }}
          key: ${{ secrets.SITEGROUND_PRIVATE_KEY }}
          passphrase: ${{ secrets.SITEGROUND_PASSPHRASE }}
          port: ${{ secrets.SITEGROUND_PORT }}
          source: "index.html,style.css,assets,.htaccess"
          target: /home/customer/www/web.eccellenzeestetiche.it/public_html/stria-tech
          overwrite: true

      - name: Purge SiteGround cache
        run: |
          curl -s -X POST "https://api.siteground.com/v1/caches/dynamic/purge" \
            -H "Authorization: Bearer ${{ secrets.SITEGROUND_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"site_id": "${{ secrets.SITEGROUND_SITE_ID }}"}'
        continue-on-error: true
