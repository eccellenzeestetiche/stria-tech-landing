name: Deploy to SiteGround

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Inject cache buster into CSS link
        run: |
          VERSION=$(git rev-parse --short HEAD)
          sed -i "s|style.css?v=CACHE_BUST|style.css?v=$VERSION|g" index.html

      - name: Deploy via SCP
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SITEGROUND_HOST }}
          username: ${{ secrets.SITEGROUND_USERNAME }}
          key: ${{ secrets.SITEGROUND_PRIVATE_KEY }}
          passphrase: ${{ secrets.SITEGROUND_PASSPHRASE }}
          port: ${{ secrets.SITEGROUND_PORT }}
          source: "index.html,style.css,assets,.htaccess"
          target: /home/customer/www/web.eccellenzeestetiche.it/public_html/stria-tech
          overwrite: true

      - name: Deploy thank you page via SCP
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SITEGROUND_HOST }}
          username: ${{ secrets.SITEGROUND_USERNAME }}
          key: ${{ secrets.SITEGROUND_PRIVATE_KEY }}
          passphrase: ${{ secrets.SITEGROUND_PASSPHRASE }}
          port: ${{ secrets.SITEGROUND_PORT }}
          source: "conferma-prenotazione/index.html"
          target: /home/customer/www/web.eccellenzeestetiche.it/public_html
          overwrite: true

      - name: Purge SiteGround cache via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SITEGROUND_HOST }}
          username: ${{ secrets.SITEGROUND_USERNAME }}
          key: ${{ secrets.SITEGROUND_PRIVATE_KEY }}
          passphrase: ${{ secrets.SITEGROUND_PASSPHRASE }}
          port: ${{ secrets.SITEGROUND_PORT }}
          script: |
            cd /home/customer/www/web.eccellenzeestetiche.it/public_html
            wp sg purge || true
            touch stria-tech/index.html
            touch stria-tech/style.css
            touch conferma-prenotazione/index.html
            echo "Deploy completed and cache purge attempted"
