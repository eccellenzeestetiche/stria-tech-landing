name: Deploy to SiteGround

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy via SCP
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SITEGROUND_HOST }}
          username: ${{ secrets.SITEGROUND_USERNAME }}
          key: ${{ secrets.SITEGROUND_PRIVATE_KEY }}
          passphrase: ${{ secrets.SITEGROUND_PASSPHRASE }}
          port: ${{ secrets.SITEGROUND_PORT }}
          source: "index.html,style.css,assets,.htaccess"
          target: /home/customer/www/web.eccellenzeestetiche.it/public_html/stria-tech
          overwrite: true

      - name: Purge SiteGround cache via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SITEGROUND_HOST }}
          username: ${{ secrets.SITEGROUND_USERNAME }}
          key: ${{ secrets.SITEGROUND_PRIVATE_KEY }}
          passphrase: ${{ secrets.SITEGROUND_PASSPHRASE }}
          port: ${{ secrets.SITEGROUND_PORT }}
          script: |
            find /home/customer/tmp -type f -name "*.cache" -delete 2>/dev/null || true
            find /home/customer/tmp -type f -name "*.html" -delete 2>/dev/null || true
            echo "Cache purged"
